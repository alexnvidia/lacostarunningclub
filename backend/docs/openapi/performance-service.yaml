openapi: 3.0.3
info:
  title: La Costa Running Club - Performance Service
  version: 1.0.0
  description: Performance Crew service for race results and training plans
  contact:
    name: LCRC Tech Team

servers:
  - url: http://localhost:3007/api
    description: Local development

tags:
  - name: Race Results
    description: User race result operations
  - name: Workouts
    description: Weekly workout operations

paths:
  /performance/results:
    post:
      tags:
        - Race Results
      summary: Upload race result
      description: Submits a new race result
      operationId: uploadRaceResult
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRaceResultRequest'
      responses:
        '201':
          description: Race result uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RaceResult'
        '400':
          $ref: '#/components/responses/BadRequest'

    get:
      tags:
        - Race Results
      summary: Get user race results
      description: Returns authenticated user's race results
      operationId: getUserResults
      security:
        - BearerAuth: []
      parameters:
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Results retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/RaceResult'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /performance/results/public:
    get:
      tags:
        - Race Results
      summary: Get public race results
      description: Returns all public race results from all users
      operationId: getPublicResults
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Public results retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/PublicRaceResult'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /performance/workouts:
    get:
      tags:
        - Workouts
      summary: Get current week workout
      description: Returns published workout for current week
      operationId: getCurrentWorkout
      responses:
        '200':
          description: Workout retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyWorkout'
        '404':
          description: No workout published for current week
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Workouts
      summary: Create weekly workout (Admin only)
      description: Publishes new weekly workout. Admin access required.
      operationId: createWorkout
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutRequest'
      responses:
        '201':
          description: Workout created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyWorkout'
        '403':
          $ref: '#/components/responses/Forbidden'

  /performance/workouts/{week}/{year}:
    get:
      tags:
        - Workouts
      summary: Get workout by week
      description: Returns workout for specific week and year
      operationId: getWorkoutByWeek
      parameters:
        - name: week
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 53
        - name: year
          in: path
          required: true
          schema:
            type: integer
            minimum: 2025
      responses:
        '200':
          description: Workout retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyWorkout'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateRaceResultRequest:
      type: object
      required:
        - race_date
        - distance
      properties:
        race_date:
          type: string
          format: date
        race_name:
          type: string
          maxLength: 200
        distance:
          type: number
          format: decimal
          description: Distance in kilometers
        time:
          type: string
          description: Race time in HH:MM:SS format
          example: "01:30:45"
        pace:
          type: string
          description: Pace in min/km
          example: "5:30"
        location:
          type: string
        surface_type:
          type: string
          enum: [road, trail, track, mixed]
        elevation_gain:
          type: integer
          description: Elevation gain in meters
        avg_heart_rate:
          type: integer
        max_heart_rate:
          type: integer
        temperature:
          type: integer
        notes:
          type: string
        attachment_url:
          type: string
        is_public:
          type: boolean
          default: true

    RaceResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        race_date:
          type: string
          format: date
        race_name:
          type: string
        distance:
          type: number
        time:
          type: string
        pace:
          type: string
        location:
          type: string
        surface_type:
          type: string
        elevation_gain:
          type: integer
        notes:
          type: string
        attachment_url:
          type: string
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time

    PublicRaceResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_name:
          type: string
        race_date:
          type: string
          format: date
        race_name:
          type: string
        distance:
          type: number
        time:
          type: string
        pace:
          type: string
        location:
          type: string

    CreateWorkoutRequest:
      type: object
      required:
        - week_number
        - year
        - title
        - description
      properties:
        week_number:
          type: integer
          minimum: 1
          maximum: 53
        year:
          type: integer
        title:
          type: string
          maxLength: 200
        description:
          type: string
        workout_type:
          type: string
          enum: [technique, speed, endurance, recovery, strength, mixed]
        estimated_duration:
          type: integer
          description: Duration in minutes
        estimated_distance:
          type: number
          description: Distance in kilometers
        difficulty_level:
          type: string
          enum: [beginner, intermediate, advanced]
        warmup:
          type: string
        main_set:
          type: string
        cooldown:
          type: string
        week_start_date:
          type: string
          format: date
        week_end_date:
          type: string
          format: date
        is_published:
          type: boolean
          default: true

    WeeklyWorkout:
      type: object
      properties:
        id:
          type: string
          format: uuid
        week_number:
          type: integer
        year:
          type: integer
        title:
          type: string
        description:
          type: string
        workout_type:
          type: string
        estimated_duration:
          type: integer
        estimated_distance:
          type: number
        difficulty_level:
          type: string
        warmup:
          type: string
        main_set:
          type: string
        cooldown:
          type: string
        week_start_date:
          type: string
          format: date
        week_end_date:
          type: string
          format: date
        published_at:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Forbidden:
      description: Forbidden - Admin access required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
