openapi: 3.0.3
info:
  title: La Costa Running Club - User Service
  version: 1.0.0
  description: User profile management service
  contact:
    name: LCRC Tech Team

servers:
  - url: http://localhost:3002/api
    description: Local development

tags:
  - name: Profile
    description: User profile operations

paths:
  /users/profile:
    get:
      tags:
        - Profile
      summary: Get user profile
      description: Returns authenticated user's profile
      operationId: getProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags:
        - Profile
      summary: Update user profile
      description: Updates authenticated user's profile information
      operationId: updateProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/rewards/{milestone}/claim:
    post:
      tags:
        - Profile
      summary: Claim reward
      description: Claim a reward for a specific milestone
      operationId: claimReward
      security:
        - BearerAuth: []
      parameters:
        - name: milestone
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reward claimed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserReward'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/{id}:
    get:
      tags:
        - Profile
      summary: Get user by ID (Admin only)
      description: Returns user profile by ID. Admin access required.
      operationId: getUserById
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [user, admin]
        created_at:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
        subscription:
          $ref: '#/components/schemas/UserSubscription'
        rewards:
          type: array
          items:
            $ref: '#/components/schemas/UserReward'

    UserSubscription:
      type: object
      properties:
        status:
          type: string
        active_since:
          type: string
          format: date-time
        months_active:
          type: integer

    UserReward:
      type: object
      properties:
        milestone_months:
          type: integer
        unlocked:
          type: boolean
        claimed:
          type: boolean
        unlocked_at:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        first_name:
          type: string
          minLength: 2
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        phone:
          type: string
          pattern: '^\+?[1-9]\d{1,14}$'

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Forbidden:
      description: Forbidden - Admin access required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
