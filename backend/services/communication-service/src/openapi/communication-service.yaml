openapi: 3.0.3
info:
  title: La Costa Running Club - Communication Service
  version: 1.0.0
  description: Messaging and communication service for user support
  contact:
    name: LCRC Tech Team

servers:
  - url: http://localhost:3006/api
    description: Local development

tags:
  - name: Messages
    description: User message operations
  - name: Replies
    description: Message reply operations

paths:
  /messages:
    post:
      tags:
        - Messages
      summary: Send new message
      description: Creates a new message from user to club
      operationId: createMessage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '201':
          description: Message sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'

    get:
      tags:
        - Messages
      summary: List messages
      description: |
        Returns messages for the authenticated user.
        - Regular users see only their own tickets.
        - ADMIN/SUPPORT see all tickets and can filter by assignment.
      operationId: listMessages
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, resolved, closed]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: assigned_to
          in: query
          description: "Filter by assignment (ADMIN/SUPPORT only). `me` = assigned to caller, `unassigned` = no assignee."
          schema:
            type: string
            enum: [me, unassigned]
      responses:
        '200':
          description: Messages retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/MessageSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /messages/{id}:
    get:
      tags:
        - Messages
      summary: Get message details
      description: Returns message with all replies
      operationId: getMessage
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Message retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Messages
      summary: Update message status (Admin only)
      description: Updates message status or assigns to admin
      operationId: updateMessage
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [open, in_progress, resolved, closed]
                assigned_to_user_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Message updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          $ref: '#/components/responses/Forbidden'

  /messages/{id}/replies:
    post:
      tags:
        - Replies
      summary: Reply to message
      description: Adds a reply to existing message
      operationId: replyToMessage
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReplyRequest'
      responses:
        '201':
          description: Reply added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageReply'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateMessageRequest:
      type: object
      required:
        - subject
        - message
      properties:
        subject:
          type: string
          maxLength: 200
        message:
          type: string
        category:
          type: string
          enum: [general_inquiry, order_issue, suggestion, performance_crew, event, other]
        priority:
          type: string
          enum: [low, normal, high, urgent]
          default: normal

    CreateReplyRequest:
      type: object
      required:
        - reply
      properties:
        reply:
          type: string
        attachment_url:
          type: string

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        subject:
          type: string
        message:
          type: string
        category:
          type: string
        priority:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MessageSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subject:
          type: string
        category:
          type: string
        status:
          type: string
        priority:
          type: string
        created_at:
          type: string
          format: date-time
        unread_replies:
          type: integer
        assigned_to_user_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the agent assigned to this ticket (only included for ADMIN/SUPPORT)

    MessageDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        subject:
          type: string
        message:
          type: string
        category:
          type: string
        priority:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        replies:
          type: array
          items:
            $ref: '#/components/schemas/MessageReply'

    MessageReply:
      type: object
      properties:
        id:
          type: string
          format: uuid
        message_id:
          type: string
          format: uuid
        author_user_id:
          type: string
          format: uuid
        reply:
          type: string
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    NotFound:
      description: Message not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
